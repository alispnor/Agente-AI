version: "3.9"

services:
  agents-ai:
    build: .
    container_name: agents-ai
    ports:
      # Host: evita conflito com outro serviço na 3000; dentro do container continua 3000
      - "${AGENTS_AI_HOST_PORT:-3001}:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ${PROJECT_PATH:-/tmp}:/mnt/projects:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
